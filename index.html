<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تخطيط الرحلة العائلية 🌴</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a5f7a;
            --accent: #ff8c32;
            --success: #27ae60;
            --bg: #f8fafc;
            --text: #2d3436;
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 0;
            color: var(--text);
        }
        header {
            background: linear-gradient(135deg, var(--primary) 0%, #082032 100%);
            color: white;
            padding: 50px 20px;
            text-align: center;
            border-radius: 0 0 40px 40px;
        }
        .container { max-width: 700px; margin: -40px auto 50px; padding: 0 20px; }
        
        .stat-banner {
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }
        .stat-item { text-align: center; }
        .stat-num { display: block; font-size: 1.8em; font-weight: bold; color: var(--accent); }
        .stat-label { font-size: 0.85em; color: #7f8c8d; }

        .card {
            background: white;
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.03);
            margin-bottom: 25px;
        }
        h2 { color: var(--primary); font-size: 1.2em; margin-top: 0; border-right: 4px solid var(--accent); padding-right: 12px; }

        /* تنسيق الخيارات */
        .grid-options { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; }
        .option-item {
            border: 2px solid #f1f2f6; border-radius: 15px; padding: 12px;
            text-align: center; cursor: pointer; transition: 0.2s; background: #fff;
        }
        input:checked + .option-item { border-color: var(--accent); background: #fff9f4; transform: scale(1.03); }
        input { display: none; }

        /* تنسيق المدخلات */
        input[type="text"], select, textarea {
            width: 100%; padding: 14px; border: 2px solid #f1f2f6; border-radius: 12px; font-family: inherit; margin-top: 8px; box-sizing: border-box;
        }

        button {
            background: var(--accent); color: white; border: none; padding: 18px;
            width: 100%; border-radius: 15px; font-size: 1.1em; font-weight: bold;
            cursor: pointer; transition: 0.3s; box-shadow: 0 8px 20px rgba(255, 140, 50, 0.2);
        }
        button:hover { background: #e67e22; }

        /* تصميم عرض النتائج "العصري" بدلاً من الشيت */
        .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-top: 15px; }
        .vote-tag {
            background: #fff; padding: 12px; border-radius: 15px; border: 1px solid #eee;
            text-align: center; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-left: 5px; }
        .status-yes { background: var(--success); }
        .status-maybe { background: #f1c40f; }
        .status-no { background: #e74c3c; }
        .vote-name { font-weight: bold; display: block; margin-bottom: 5px; }
        .vote-loc { font-size: 0.8em; color: #7f8c8d; }

        #success-msg { display: none; background: var(--success); color: white; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>رحلتنا العائلية 🌴</h1>
    <p>صوتك يحدد وجهتنا القادمة</p>
</header>

<div class="container">
    <div class="stat-banner">
        <div class="stat-item"><span class="stat-num" id="stat-yes">0</span><span class="stat-label">أكدوا الحضور</span></div>
        <div class="stat-item"><span class="stat-num" id="stat-total">0</span><span class="stat-label">إجمالي المصوتين</span></div>
    </div>

    <div id="success-msg">تم تسجيل صوتك! سيتم تحديث النتائج الآن.. ✨</div>

    <form id="trip-form">
        <div class="card">
            <h2>👤 من معنا؟</h2>
            <input type="text" name="name" placeholder="اكتب اسمك هنا..." required>
            <select name="attending" required style="margin-top: 15px;">
                <option value="yes">بإذن الله، معكم!</option>
                <option value="maybe">ربما</option>
                <option value="no">لن أستطيع</option>
            </select>
        </div>

        <div class="card">
            <h2>📍 الوجهة المفضلة</h2>
            <div class="grid-options">
                <label><input type="radio" name="location" value="المخيبة" required><div class="option-item">🌊 المخيبة</div></label>
                <label><input type="radio" name="location" value="جرش"><div class="option-item">🏛️ جرش</div></label>
                <label><input type="radio" name="location" value="عجلون"><div class="option-item">🏰 عجلون</div></label>
                <label><input type="radio" name="location" value="المثلث"><div class="option-item">⛰️ المثلث</div></label>
            </div>
        </div>

        <div class="card">
            <h2>💬 كلمة أخيرة</h2>
            <textarea name="message" rows="2" placeholder="اقتراحات أو ملاحظات..."></textarea>
        </div>

        <button type="submit" id="submit-btn">تأكيد التصويت ✨</button>
    </form>

    <div class="card">
        <h2>📊 الأصوات الحالية</h2>
        <div id="live-results" class="results-grid">
            <p style="text-align: center; color: #999;">جاري تحميل النتائج...</p>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwKHkFyODQtLOfVYlB3rjKg-VEwvgHFzwTA6qVriALAdzjnKGsbkn_M7m-FtlwPhZMy7A/exec';
    const csvURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ3gvcZGCFU_5Hulp9Pos85XL4w3m2hgQ7ZG1ieZNGmH8zULhs9vqJePizw9338MQ-i25py-oz_JQjC/pub?output=csv';
    
    async function loadResults() {
        try {
            const response = await fetch(csvURL);
            const data = await response.text();
            const rows = data.split('\n').slice(1).filter(r => r.trim() !== '');
            
            let html = '';
            let yesCount = 0;

            rows.forEach(row => {
                const cols = row.split(',').map(c => c.replace(/"/g, ''));
                const [name, attending, location] = cols;
                
                let statusClass = 'status-maybe';
                if(attending === 'yes') { statusClass = 'status-yes'; yesCount++; }
                if(attending === 'no') statusClass = 'status-no';

                html += `
                    <div class="vote-tag">
                        <span class="vote-name"><span class="status-dot ${statusClass}"></span>${name}</span>
                        <span class="vote-loc">📍 ${location || 'لم يحدد'}</span>
                    </div>
                `;
            });

            document.getElementById('live-results').innerHTML = html || '<p>لا توجد أصوات بعد</p>';
            document.getElementById('stat-total').innerText = rows.length;
            document.getElementById('stat-yes').innerText = yesCount;
        } catch (e) { console.error(e); }
    }

    loadResults();

    document.getElementById('trip-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.innerHTML = "جاري الحفظ...";

        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: new FormData(this)})
        .then(() => {
            document.getElementById('trip-form').style.display = 'none';
            document.getElementById('success-msg').style.display = 'block';
            setTimeout(() => location.reload(), 2500);
        });
    });
</script>

</body>
</html>
