<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تخطيط الرحلة العائلية 🌴</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a5f7a;
            --accent: #ff8c32;
            --success: #27ae60;
            --bg: #f0f4f8;
            --text: #2d3436;
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            color: var(--text);
            line-height: 1.6;
        }
        header {
            background: linear-gradient(135deg, var(--primary) 0%, #082032 100%);
            color: white;
            padding: 60px 20px;
            text-align: center;
            border-radius: 0 0 30px 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: -30px;
            padding: 0 20px;
        }
        .stat-card {
            background: white;
            padding: 15px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: center;
            min-width: 150px;
        }
        .stat-number { font-size: 2em; font-weight: bold; color: var(--accent); display: block; }
        .stat-label { font-size: 0.9em; color: #7f8c8d; }

        .container { max-width: 700px; margin: 40px auto; padding: 0 20px; }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            border-top: 5px solid var(--primary);
        }

        h2 { color: var(--primary); font-size: 1.3em; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        /* تصميم الخيارات الجمالي */
        .grid-options { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; }
        .option-item {
            border: 2px solid #edeff2;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            background: #fbfbfb;
        }
        input[type="radio"]:checked + .option-item, 
        input[type="checkbox"]:checked + .option-item {
            border-color: var(--accent);
            background: #fff8f3;
            transform: translateY(-3px);
        }
        input[type="radio"], input[type="checkbox"] { display: none; }

        .input-group input, .input-group select, textarea {
            width: 100%; padding: 15px; border: 2px solid #edeff2; border-radius: 12px; font-family: inherit; margin-top: 8px;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 15px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(255, 140, 50, 0.3);
        }
        button:hover { background: #e67e22; transform: translateY(-2px); }

        #success-msg {
            display: none;
            background: var(--success);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }

        /* حاوية الشيت بتصميم أفضل */
        .results-box {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            margin-top: 30px;
        }
        iframe { width: 100%; height: 350px; border: none; }
    </style>
</head>
<body>

<header>
    <h1>رحلتنا العائلية القادمة 🌳</h1>
    <p>صوتك يهمنا لنجعلها رحلة لا تُنسى</p>
</header>

<div class="stats-bar">
    <div class="stat-card">
        <span class="stat-number" id="count-yes">...</span>
        <span class="stat-label">أكدوا الحضور ✅</span>
    </div>
    <div class="stat-card">
        <span class="stat-number" id="count-total">...</span>
        <span class="stat-label">إجمالي المصوتين 👤</span>
    </div>
</div>

<div class="container">
    <div id="success-msg">🎉 تم استلام تصويتك بنجاح، ننتظركم بشوق!</div>

    <form id="trip-form">
        <div class="card">
            <h2>👤 البيانات الأساسية</h2>
            <div class="input-group">
                <label>الاسم الكامل</label>
                <input type="text" name="name" placeholder="مثلاً: أبو أحمد" required>
            </div>
            <div class="input-group" style="margin-top:15px">
                <label>هل ستنضم إلينا؟</label>
                <select name="attending" id="attending-select" required>
                    <option value="yes">بإذن الله، معكم!</option>
                    <option value="maybe">ربما (حسب الظروف)</option>
                    <option value="no">للأسف لن أستطيع</option>
                </select>
            </div>
        </div>

        <div class="card">
            <h2>📍 أين الوجهة؟</h2>
            <div class="grid-options">
                <label><input type="radio" name="location" value="المخيبة" required><div class="option-item">🌊 المخيبة</div></label>
                <label><input type="radio" name="location" value="جرش"><div class="option-item">🏛️ جرش</div></label>
                <label><input type="radio" name="location" value="عجلون"><div class="option-item">🏰 عجلون</div></label>
                <label><input type="radio" name="location" value="المثلث"><div class="option-item">⛰️ المثلث</div></label>
            </div>
            <input type="text" name="other_location" placeholder="أو اكتب مكاناً آخر هنا..." style="margin-top:15px">
        </div>

        <div class="card">
            <h2>📅 متى نذهب؟</h2>
            <div class="grid-options">
                <label><input type="checkbox" name="day" value="الخميس"><div class="option-item">الخميس</div></label>
                <label><input type="checkbox" name="day" value="الجمعة"><div class="option-item">الجمعة</div></label>
                <label><input type="checkbox" name="day" value="السبت"><div class="option-item">السبت</div></label>
            </div>
        </div>

        <div class="card">
            <h2>💬 ملاحظاتك</h2>
            <textarea name="message" rows="3" placeholder="أي اقتراحات للأكل أو الأنشطة؟"></textarea>
        </div>

        <button type="submit" id="submit-btn">إرسال التصويت ✨</button>
    </form>

    <div class="results-box">
        <div style="padding: 15px; background: var(--primary); color: white; font-weight: bold; text-align: center;">📊 لوحة النتائج الحالية</div>
        <iframe id="results-iframe" src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQ3gvcZGCFU_5Hulp9Pos85XL4w3m2hgQ7ZG1ieZNGmH8zULhs9vqJePizw9338MQ-i25py-oz_JQjC/pubhtml?widget=true&amp;headers=false"></iframe>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwKHkFyODQtLOfVYlB3rjKg-VEwvgHFzwTA6qVriALAdzjnKGsbkn_M7m-FtlwPhZMy7A/exec';
    const csvURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ3gvcZGCFU_5Hulp9Pos85XL4w3m2hgQ7ZG1ieZNGmH8zULhs9vqJePizw9338MQ-i25py-oz_JQjC/pub?output=csv';
    
    const form = document.getElementById('trip-form');
    const btn = document.getElementById('submit-btn');
    const msg = document.getElementById('success-msg');

    // وظيفة ذكية لجلب الأرقام من الشيت مباشرة
    async function updateCounters() {
        try {
            const response = await fetch(csvURL);
            const data = await response.text();
            const rows = data.split('\n').slice(1); // حذف العنوان
            
            const total = rows.filter(row => row.trim() !== '').length;
            const yesCount = rows.filter(row => row.includes(',yes,') || row.includes(',"yes",')).length;
            
            document.getElementById('count-total').innerText = total;
            document.getElementById('count-yes').innerText = yesCount;
        } catch (e) {
            document.getElementById('count-total').innerText = "?";
            document.getElementById('count-yes').innerText = "?";
        }
    }

    // تحديث الأرقام عند فتح الصفحة
    updateCounters();

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerHTML = "جاري الحفظ...";
        
        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: new FormData(form)})
        .then(() => {
            btn.style.display = 'none';
            form.style.display = 'none';
            msg.style.display = 'block';
            window.scrollTo(0,0);
            setTimeout(() => { 
                location.reload(); // إعادة تحميل الصفحة لرؤية النتائج الجديدة
            }, 3000);
        })
        .catch(error => {
            btn.disabled = false;
            btn.innerHTML = "إرسال التصويت ✨";
            alert('حدث خطأ، حاول مجدداً.');
        });
    });
</script>

</body>
</html>
