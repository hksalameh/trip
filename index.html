<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استبيان رحلة العائلة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #27ae60;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            color: var(--primary-color);
        }
        header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .container {
            max-width: 800px;
            margin: -30px auto 50px;
            padding: 20px;
        }
        .card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }
        h2 { color: var(--accent-color); border-right: 4px solid var(--accent-color); padding-right: 10px; }
        .grid-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .option-item {
            border: 2px solid #eee;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .option-item:hover { border-color: var(--accent-color); background: #f0fff4; }
        input[type="radio"], input[type="checkbox"] { display: none; }
        input[type="radio"]:checked + .option-item, 
        input[type="checkbox"]:checked + .option-item {
            border-color: var(--accent-color);
            background: #e8f5e9;
            box-shadow: 0 4px 8px rgba(39, 174, 96, 0.2);
        }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input[type="text"], input[type="number"], select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
        }
        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
            font-weight: bold;
        }
        button:hover { background-color: #219150; }
        .footer { text-align: center; font-size: 0.9em; color: #7f8c8d; }
    </style>
</head>
<body>

<header>
    <h1>دعوة لرحلة العائلة الجميلة 🌴</h1>
    <p>صوتوا وشاركونا لنخطط لأجمل يوم مع بعض</p>
</header>

<div class="container">
    <form action="https://formspree.io/f/xjgjznkp" method="POST">
        
        <div class="card">
            <h2>البيانات الأساسية</h2>
            <div class="input-group">
                <label>الاسم الكامل</label>
                <input type="text" name="name" placeholder="اكتب اسمك هنا..." required>
            </div>
            <div class="input-group">
                <label>هل ستنضم إلينا؟</label>
                <select name="attending" required>
                    <option value="yes">بإذن الله، معكم!</option>
                    <option value="maybe">ربما (حسب الظروف)</option>
                    <option value="no">للأسف لن أستطيع</option>
                </select>
            </div>
        </div>

        <div class="card">
            <h2>المكان المقترح</h2>
            <p>اختر المكان الذي تفضله:</p>
            <div class="grid-options">
                <label>
                    <input type="radio" name="location" value="مزرعة خاصة" required>
                    <div class="option-item">
                        <h3>🏡 مزرعة خاصة</h3>
                        <p>خصوصية وهدوء ومسبح</p>
                    </div>
                </label>
                <label>
                    <input type="radio" name="location" value="منطقة جبلية">
                    <div class="option-item">
                        <h3>⛰️ منطقة جبلية</h3>
                        <p>طبيعة خلابة وجلسات عربية</p>
                    </div>
                </label>
                <label>
                    <input type="radio" name="location" value="متنزه عام">
                    <div class="option-item">
                        <h3>🌳 متنزه عام</h3>
                        <p>ألعاب للأطفال ومساحات واسعة</p>
                    </div>
                </label>
            </div>
        </div>

        <div class="card">
            <h2>اليوم المفضل</h2>
            <div class="grid-options">
                <label>
                    <input type="checkbox" name="day" value="الجمعة">
                    <div class="option-item">الجمعة القادم</div>
                </label>
                <label>
                    <input type="checkbox" name="day" value="السبت">
                    <div class="option-item">السبت القادم</div>
                </label>
            </div>
        </div>

        <div class="card">
            <h2>اقتراحات إضافية</h2>
            <textarea name="message" rows="4" placeholder="هل لديك أي ملاحظات أو اقتراح لنوع الطعام؟"></textarea>
        </div>

        <button type="submit">إرسال التصويت ✨</button>
    </form>
    
    <div class="footer">
        <p>مع تحياتي</p>
    </div>
</div>

</body>
</html>
