<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استبيان الرحلة القادمة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #27ae60;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            color: var(--primary-color);
        }
        header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .container {
            max-width: 800px;
            margin: -30px auto 50px;
            padding: 20px;
        }
        .card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }
        h2 { 
            color: var(--accent-color); 
            border-right: 4px solid var(--accent-color); 
            padding-right: 10px; 
            font-size: 1.2em; 
            margin-bottom: 20px;
        }
        .grid-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 15px;
        }
        .option-item {
            border: 2px solid #eee;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        input[type="radio"], input[type="checkbox"] { display: none; }
        input[type="radio"]:checked + .option-item, 
        input[type="checkbox"]:checked + .option-item {
            border-color: var(--accent-color);
            background: #e8f5e9;
            box-shadow: 0 4px 8px rgba(39, 174, 96, 0.2);
        }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input[type="text"], select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
        }
        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
            font-weight: bold;
            margin-top: 10px;
        }
        button:hover { background-color: #219150; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        .footer { text-align: center; font-size: 0.9em; color: #7f8c8d; margin-top: 20px; }
        #success-msg {
            display: none;
            color: #27ae60;
            background: #e8f5e9;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 25px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .results-container {
            width: 100%;
            height: 400px;
            border: none;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

<header>
    <h1>الرحلة القادمة بإذن الله 🌴</h1>
    <p>صوتوا وشاركونا لنخطط لأجمل يوم مع بعض</p>
</header>

<div class="container">
    <div id="success-msg">تم استلام تصويتك بنجاح، شكراً لك! ❤️</div>

    <form id="trip-form">
        <div class="card">
            <h2>البيانات الأساسية</h2>
            <div class="input-group">
                <label>الاسم</label>
                <input type="text" name="name" placeholder="اكتب اسمك هنا..." required>
            </div>
            <div class="input-group">
                <label>هل ستنضم إلينا؟</label>
                <select name="attending" required>
                    <option value="yes">بإذن الله، معكم!</option>
                    <option value="maybe">ربما (حسب الظروف)</option>
                    <option value="no">للأسف لن أستطيع</option>
                </select>
            </div>
        </div>

        <div class="card">
            <h2>المكان المقترح</h2>
            <div class="grid-options">
                <label>
                    <input type="radio" name="location" value="المخيبة" required>
                    <div class="option-item">📍 المخيبة</div>
                </label>
                <label>
                    <input type="radio" name="location" value="جرش">
                    <div class="option-item">📍 جرش</div>
                </label>
                <label>
                    <input type="radio" name="location" value="عجلون">
                    <div class="option-item">📍 عجلون</div>
                </label>
                <label>
                    <input type="radio" name="location" value="المثلث">
                    <div class="option-item">📍 المثلث</div>
                </label>
            </div>
            <div class="input-group" style="margin-top: 20px;">
                <label>أو اقترح مكاناً آخر:</label>
                <input type="text" name="other_location" placeholder="اكتب اسم المكان المقترح هنا...">
            </div>
        </div>

        <div class="card">
            <h2>اليوم المقترح</h2>
            <div class="grid-options">
                <label>
                    <input type="checkbox" name="day" value="الخميس القادم">
                    <div class="option-item">الخميس القادم</div>
                </label>
                <label>
                    <input type="checkbox" name="day" value="الجمعة القادمة">
                    <div class="option-item">الجمعة القادمة</div>
                </label>
                <label>
                    <input type="checkbox" name="day" value="السبت القادم">
                    <div class="option-item">السبت القادم</div>
                </label>
            </div>
        </div>

        <div class="card">
            <h2>ملاحظات إضافية</h2>
            <textarea name="message" rows="4" placeholder="أي ملاحظات أو اقتراحات أخرى؟"></textarea>
        </div>

        <button type="submit" id="submit-btn">إرسال التصويت ✨</button>
    </form>
    
    <div class="card">
        <h2>نتائج التصويت الحالية</h2>
        <div class="results-container">
            <iframe id="results-iframe" src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQ3gvcZGCFU_5Hulp9Pos85XL4w3m2hgQ7ZG1ieZNGmH8zULhs9vqJePizw9338MQ-i25py-oz_JQjC/pubhtml?widget=true&amp;headers=false"></iframe>
        </div>
    </div>
    
    <div class="footer">
        <p>مع تحياتي</p>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbx9LxntKkpkKLSxxxH9X_RequMDmwWl3QrkAFJIWNBsQj_PZ7QYB9TZn2j8dqixYhN8fw/exec';
    const form = document.getElementById('trip-form');
    const btn = document.getElementById('submit-btn');
    const msg = document.getElementById('success-msg');
    const resultsIframe = document.getElementById('results-iframe');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerHTML = "جاري الإرسال...";
        
        fetch(scriptURL, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: new FormData(form)
        })
        .then(() => {
            btn.style.display = 'none';
            form.style.display = 'none';
            msg.style.display = 'block';
            window.scrollTo(0, 0);
            
            // تحديث الجدول بعد 2 ثانية لضمان ظهور البيانات الجديدة
            setTimeout(() => {
                resultsIframe.src = resultsIframe.src;
            }, 2000);
        })
        .catch(error => {
            btn.disabled = false;
            btn.innerHTML = "إرسال التصويت ✨";
            alert('حدث خطأ، يرجى المحاولة لاحقاً.');
        });
    });
</script>

</body>
</html>
